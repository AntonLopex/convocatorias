<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convocatorias</title>
    <!-- Fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="my_script.js" defer></script>
    <link rel="shortcut icon" href="img/escudo-1676.png" />
</head>
<body>
    <h1>
        <img src="img/escudo-1676.png" alt="Icono" class="icono-titulo">
        Convocatoria do Partido
    </h1>
    <form id="convocatoria-form">
        <label for="fecha">Data:</label>
        <input type="date" id="fecha" required>
        
        <label for="campo">Nome do Campo:</label>
        <input type="text" id="campo" required>
        
        <label for="hora-reunión">Hora da Convocatoria:</label>
        <input type="time" id="hora-reunión" required>
        
        <label for="hora-partido">Hora do Partido:</label>
        <input type="time" id="hora-partido" required>
        
        <label for="rival">Nome do Rival:</label>
        <input type="text" id="rival" required>
        
        <fieldset>
            <legend>Selecciona os xogadores:</legend>
            <label for="categoria-select">Categoría:</label>
            <div class="select-wrapper">
                <select id="categoria-select">
                    <option value="" disabled selected>Escolla un equipo</option>
                    <option value="alevin">Alevín</option>
                    <option value="infantil">Infantil</option>
                </select>
                <span class="select-arrow" aria-hidden="true"></span>
            </div>

            <!-- Sección de jugadores: oculta inicialmente, se muestra tras elegir categoría -->
            <div id="players-section" style="display: none;">
                <div id="jugadores-container"></div>
                <button type="button" id="select-all">Seleccionar Todo</button>
            </div>
        </fieldset>
        
        <!-- Nuevo checkbox "fora de casa" (estilo tarjeta similar a xogadores) -->
        <div class="faux-checkbox">
            <input type="checkbox" id="fora-de-casa">
            <label for="fora-de-casa">Fora de Casa</label>
        </div>
        
        <!-- Nuevo campo para "Ubicación do campo", inicialmente oculto -->
        <div id="ubicacion-container" style="display: none;">
            <label for="ubicacion">Ubicación do Campo:</label>
            <textarea id="ubicacion" rows="3"></textarea>
        </div>
        
        <button type="submit">Xerar Convocatoria</button>
    </form>
    
    <div id="resultado">
        <button id="copy-button" style="display: none;">Copiar</button>
        <pre id="resultado-texto"></pre>
    </div>
</body>
</html>
